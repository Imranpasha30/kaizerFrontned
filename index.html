<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KAIZER NEWS — Autonomous Live Director & AI Clips</title>
    <meta name="description" content="One engine that films your concerts live and clips your archive into social-ready posts — no editor, no operator." />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23c0392b'/><text x='4' y='24' font-size='22' font-weight='bold' fill='white'>K</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <!--
      Static legal links present in the raw HTML so crawlers (Google's
      OAuth consent-screen verifier in particular) find a link to the
      privacy policy without needing to execute the React bundle. The
      React Landing page renders its own footer with the same links
      after hydration; this static block sits at the very bottom and
      is genuinely visible (no off-screen / aria-hidden tricks that
      could trip cloaking detection).
    -->
    <noscript>
      <p style="padding:24px;color:#222;font-family:sans-serif;">
        Kaizer News requires JavaScript to run. Read our
        <a href="/privacy">Privacy Policy</a> and
        <a href="/terms">Terms of Service</a>.
      </p>
    </noscript>
    <footer style="text-align:center;padding:12px 16px;font-size:12px;color:#9ca3af;font-family:Inter,system-ui,sans-serif;">
      <a href="/privacy" style="color:inherit;text-decoration:underline;margin-right:14px;">Privacy Policy</a>
      <a href="/terms" style="color:inherit;text-decoration:underline;">Terms of Service</a>
    </footer>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
