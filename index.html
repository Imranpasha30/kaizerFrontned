<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KAIZER NEWS — Autonomous Live Director & AI Clips</title>
    <meta name="description" content="One engine that films your concerts live and clips your archive into social-ready posts — no editor, no operator." />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23c0392b'/><text x='4' y='24' font-size='22' font-weight='bold' fill='white'>K</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <!--
      Static fallback footer with legal links — present in the raw HTML
      so crawlers (including Google's OAuth consent-screen verifier)
      that don't fully execute the React SPA can still find a link to
      the privacy policy. React mounts inside #root above and renders
      its own footer; this block stays hidden visually but remains in
      the DOM for any non-JS reader. Style is inline so it doesn't
      depend on the Tailwind bundle being parsed first.
    -->
    <noscript>
      <p style="padding:24px;color:#222;font-family:sans-serif;">
        Kaizer News requires JavaScript. Read our
        <a href="/privacy">Privacy Policy</a> and
        <a href="/terms">Terms of Service</a>.
      </p>
    </noscript>
    <footer aria-hidden="true" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;">
      <a href="/privacy">Privacy Policy</a>
      <a href="/terms">Terms of Service</a>
    </footer>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
